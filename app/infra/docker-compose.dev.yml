services:
  giteria-frontend-dev:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    container_name: giteria-frontend-dev

    # Expose le front sur l'hote (accessible depuis le reseau de la machine hote selon la config Docker).
    ports:
      # Permet d'eviter les conflits (ex: port 3000 deja pris sur Dokploy).
      # Usage: HOST_PORT=3001 docker compose -f app/infra/docker-compose.dev.yml up
      - "${HOST_PORT:-3000}:3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    working_dir: /app
    user: root

    volumes:
      - ..:/app:cached
      # Le bind-mount ecrase /app, donc on masque node_modules pour garder celui du conteneur.
      - /app/node_modules
      - app_next:/app/.next

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app_next:
