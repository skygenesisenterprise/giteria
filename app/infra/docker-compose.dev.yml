services:
  giteria-frontend-dev:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    container_name: giteria-frontend-dev

    # Le port est uniquement visible dans le réseau Docker
    expose:
      - "3001"

    environment:
      NODE_ENV: development
      PORT: 3001
      HOSTNAME: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"

    working_dir: /app
    user: root

    volumes:
      - ..:/app:cached
      # Note: node_modules n'est pas monté car il est installé dans l'image Docker
      - app_next:/app/.next

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

    # 🔑 Indexation par Traefik (l’infra décide de l’exposition)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.giteria-frontend-dev.rule=Host(`localhost`) || Host(`giteria.local`)"
      - "traefik.http.routers.giteria-frontend-dev.entrypoints=web"
      - "traefik.http.services.giteria-frontend-dev.loadbalancer.server.port=3001"
      - "traefik.http.routers.giteria-frontend-dev.priority=1"

    networks:
      - giteria-network-dev

networks:
  giteria-network-dev:
    name: aether-network-dev
    driver: bridge

volumes:
  app_next:
